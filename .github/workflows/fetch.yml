name: Fetch Fitness Data

on:
  schedule:
    - cron: "0 * * * *"   # every hour; GitHub Actions UTC — 01:30 UTC = 07:00 IST
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth

      - name: Download Apple Health CSVs from Google Drive
        continue-on-error: true
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p apple_health
          python - <<'PYEOF'
          import json, os, sys, traceback
          from pathlib import Path
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io

          sa_json = os.environ.get("GDRIVE_SERVICE_ACCOUNT_JSON", "")
          print(f"SA JSON present: {bool(sa_json)} len={len(sa_json)}")
          if not sa_json:
              print("No service account JSON — skipping")
              sys.exit(0)

          try:
              sa_info = json.loads(sa_json)
              print(f"SA email: {sa_info.get('client_email')}")
              creds = service_account.Credentials.from_service_account_info(
                          sa_info, scopes=["https://www.googleapis.com/auth/drive.readonly"])
              drive = build("drive", "v3", credentials=creds, cache_discovery=False)
              print("Drive client built OK")

              for FOLDER_ID in ["1toz5ZW8_gpXyfmDRP0agLFw-adj0CJH2",
                                 "1mjjTFVzstPqCY3iugTiZ2-QpBqpN0DUz",
                                 "1k6fFcBwtEanwmxpEZ7FfwXwZMCvBPDwF"]:
                  print(f"Searching folder: {FOLDER_ID}")
                  results = drive.files().list(
                      q=f"'{FOLDER_ID}' in parents and trashed=false",
                      fields="files(id, name, mimeType)",
                      pageSize=10
                  ).execute()
                  files = results.get("files", [])
                  print(f"  Total files in folder: {len(files)}")
                  for f in files:
                      print(f"  - {f['name']} ({f['mimeType']})")
                  health_files = [f for f in files if "HealthMetrics" in f["name"]]
                  print(f"  HealthMetrics files: {len(health_files)}")
                  for f in health_files:
                      name = f["name"]
                      if not name.endswith(".csv"):
                          name = name + ".csv"
                      dest = Path("apple_health") / name
                      mime = f.get("mimeType", "")
                      print(f"  Downloading {f['name']} as {name}...")
                      try:
                          if "spreadsheet" in mime or "google-apps" in mime:
                              req = drive.files().export_media(fileId=f["id"], mimeType="text/csv")
                          else:
                              req = drive.files().get_media(fileId=f["id"])
                          buf = io.BytesIO()
                          dl = MediaIoBaseDownload(buf, req)
                          done = False
                          while not done:
                              _, done = dl.next_chunk()
                          dest.write_bytes(buf.getvalue())
                          print(f"  Saved {dest} ({len(buf.getvalue())} bytes)")
                      except Exception as e2:
                          print(f"  Download error: {e2}")
          except Exception as e:
              print(f"Drive error: {e}")
              traceback.print_exc()
          PYEOF


      - name: Debug - list downloaded files
        run: |
          echo "=== apple_health/ contents ==="
          ls -la apple_health/ 2>/dev/null || echo "Directory empty or missing"
          echo "=== First 3 lines of today file ==="
          head -3 "apple_health/HealthMetrics-2026-06-14.csv" 2>/dev/null || echo "File not found"
          echo "=== File size ==="
          wc -c "apple_health/HealthMetrics-2026-06-14.csv" 2>/dev/null || echo "N/A"

      - name: Run fetch script
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
          APPLE_HEALTH_CSV_DIR: ${{ github.workspace }}/apple_health
        run: python fetch_latest.py

      - name: Commit latest_metrics.json
        run: |
          git config user.name  "fitness-sync-bot"
          git config user.email "bot@fitness-sync"
          git add latest_metrics.json
          git diff --cached --quiet || git commit -m "chore: update metrics $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
